<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ハドフ巡りマップ β（埼玉県）</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --blue:#1355A4;      /* 看板ブルー：未訪問ピン */
    --blue-deep:#0C3E7C;
    --red:#D7263D;       /* チェックイン済み */
    --red-deep:#A81528;
    --tag:#FFC53D;       /* ジャンク値札イエロー */
    --ink:#17233B;
    --paper:#FFFFFF;
    --line:#DCE3EE;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Noto Sans JP",system-ui,sans-serif;
    color:var(--ink);
  }
  #map{position:fixed;inset:0;z-index:0}

  /* ── ヘッダーカード ───────────────────────── */
  .hud{
    position:fixed;top:12px;left:12px;right:12px;z-index:1000;
    display:flex;align-items:flex-start;gap:10px;pointer-events:none;
  }
  .panel{
    pointer-events:auto;
    background:var(--paper);border:1.5px solid var(--line);border-radius:14px;
    box-shadow:0 6px 20px rgba(12,32,68,.16);
    padding:10px 14px;
  }
  .title{
    display:flex;align-items:center;gap:10px;
  }
  .title h1{
    font-size:17px;font-weight:800;letter-spacing:.02em;line-height:1.2;
    color:var(--blue-deep);
  }
  .title h1 small{
    display:block;font-size:10.5px;font-weight:600;color:#5B6B85;letter-spacing:.08em;
  }
  /* ジャンク値札風の進捗タグ（signature） */
  .tag{
    position:relative;background:var(--tag);border-radius:4px 10px 10px 4px;
    padding:6px 12px 6px 16px;font-weight:800;line-height:1.1;
    box-shadow:0 3px 8px rgba(120,80,0,.25);transform:rotate(-2deg);
    white-space:nowrap;
  }
  .tag::before{ /* 値札の穴 */
    content:"";position:absolute;left:5px;top:50%;transform:translateY(-50%);
    width:6px;height:6px;border-radius:50%;background:var(--paper);
    box-shadow:inset 0 0 0 1.5px rgba(120,80,0,.5);
  }
  .tag .num{font-size:18px;letter-spacing:.02em}
  .tag .lbl{display:block;font-size:9.5px;letter-spacing:.14em;color:#6B4E00}
  .bar{
    height:5px;border-radius:3px;background:#EDF1F7;margin-top:7px;overflow:hidden;
  }
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--red),#F0596E);width:0%;transition:width .4s}

  /* ── フィルタチップ ───────────────────────── */
  .chips{
    position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:1000;
    display:flex;gap:7px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);
    border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;
    box-shadow:0 3px 10px rgba(12,32,68,.14);
  }
  .chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .chip.on.warn{background:var(--red);border-color:var(--red)}
  .chip:focus-visible{outline:3px solid var(--tag);outline-offset:1px}

  /* ── 一覧ボタン ──────────────────────────── */
  .list-btn{
    position:fixed;right:12px;bottom:calc(118px + env(safe-area-inset-bottom));z-index:1000;
    width:44px;height:44px;border-radius:50%;border:1.5px solid var(--line);
    background:var(--paper);cursor:pointer;font-size:19px;
    box-shadow:0 4px 12px rgba(12,32,68,.2);
  }
  .list-btn:focus-visible{outline:3px solid var(--tag)}

  /* ── 現在地ボタン ─────────────────────────── */
  .locate{
    position:fixed;right:12px;bottom:calc(64px + env(safe-area-inset-bottom));z-index:1000;
    width:44px;height:44px;border-radius:50%;border:1.5px solid var(--line);
    background:var(--paper);cursor:pointer;font-size:19px;
    box-shadow:0 4px 12px rgba(12,32,68,.2);transition:background .2s,border-color .2s;
  }
  .locate.on{background:var(--blue);border-color:var(--blue-deep);}
  .locate:focus-visible{outline:3px solid var(--tag)}

  /* ── ピン ─────────────────────────────────── */
  .pin{
    width:30px;height:30px;border-radius:50% 50% 50% 4px;transform:rotate(-45deg);
    background:var(--blue);border:2.5px solid #fff;
    box-shadow:0 3px 7px rgba(10,25,60,.4);
    display:flex;align-items:center;justify-content:center;
  }
  .pin span{
    transform:rotate(45deg);color:#fff;font-weight:800;font-size:12.5px;
    font-family:"Arial Black","Hiragino Kaku Gothic ProN",sans-serif;
  }
  .pin.done{background:var(--red)}
  .leaflet-div-icon{background:transparent;border:none}

  /* ── ポップアップ ─────────────────────────── */
  .leaflet-popup-content{margin:14px 16px;min-width:225px}
  .pop .brand{
    display:inline-block;font-size:10px;font-weight:800;letter-spacing:.1em;
    color:#fff;background:var(--blue);border-radius:4px;padding:2px 7px;margin-bottom:5px;
  }
  .pop.done .brand{background:var(--red)}
  .pop h2{font-size:15px;font-weight:800;line-height:1.35;margin-bottom:5px}
  .pop .addr{font-size:12px;color:#44536E;line-height:1.5}
  .pop .date{font-size:11.5px;color:var(--red);font-weight:700;margin-top:6px}
  .pop .links{margin-top:8px;font-size:12px;display:flex;gap:12px}
  .pop .links a{color:var(--blue);font-weight:700;text-decoration:none}
  .pop button{
    width:100%;margin-top:10px;border:none;border-radius:9px;padding:10px 0;
    font-size:14px;font-weight:800;cursor:pointer;color:#fff;background:var(--blue);
  }
  .pop.done button{background:#fff;color:var(--red);border:2px solid var(--red)}
  .pop .note{font-size:10px;color:#8A97AC;margin-top:7px;line-height:1.5}

  /* ── ここへ行くボタン群 ──────────────────── */
  .pop .nav-btns{display:flex;gap:6px;margin-top:10px;}
  .pop .nav-btn{
    flex:1;text-align:center;border-radius:8px;padding:8px 2px;
    font-size:11.5px;font-weight:800;text-decoration:none;border:1.5px solid;line-height:1.2;
  }
  .pop .nav-btn.google{color:#1a73e8;border-color:#1a73e8;}
  .pop .nav-btn.apple{color:#1c1c1e;border-color:#1c1c1e;}
  .pop .nav-btn.yahoo{color:#e61c24;border-color:#e61c24;}
  .pop .nav-label{
    font-size:11px;color:#5B6B85;font-weight:700;
    display:block;margin-bottom:4px;
  }

  /* ── 店舗一覧シート ─────────────────────── */
  .list-sheet{
    position:fixed;inset:0;z-index:3000;
    display:flex;flex-direction:column;background:var(--paper);
    transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,1);
  }
  .list-sheet.open{transform:translateY(0)}
  @media (prefers-reduced-motion: reduce){ .list-sheet{transition:none} }

  .list-header{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:16px 16px 0;flex-shrink:0;
    padding-top:calc(16px + env(safe-area-inset-top));
  }
  .list-header-left{display:flex;align-items:baseline;gap:8px}
  .list-header h2{font-size:18px;font-weight:800;color:var(--blue-deep)}
  .list-header-count{font-size:13px;color:#5B6B85;font-weight:600}
  .list-close{
    width:34px;height:34px;border-radius:50%;border:1.5px solid var(--line);
    background:transparent;cursor:pointer;font-size:16px;color:#5B6B85;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .list-close:focus-visible{outline:3px solid var(--tag)}

  .list-tabs{
    display:flex;gap:6px;padding:12px 16px 10px;flex-shrink:0;
    border-bottom:1.5px solid var(--line);
  }
  .list-tab{
    border:1.5px solid var(--line);background:var(--paper);color:var(--ink);
    border-radius:999px;padding:5px 14px;font-size:12.5px;font-weight:700;cursor:pointer;
  }
  .list-tab.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .list-tab.on.warn{background:var(--red);border-color:var(--red)}

  .list-body{
    flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .list-item{
    display:flex;align-items:center;gap:12px;
    padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .list-item:active{background:#f0f4fa}
  .list-item .item-info{flex:1;min-width:0}
  .list-item .item-brand{
    display:inline-block;font-size:10px;font-weight:800;letter-spacing:.08em;
    color:#fff;background:var(--blue);border-radius:4px;
    padding:1px 6px;margin-bottom:3px;
  }
  .list-item.done .item-brand{background:var(--red)}
  .list-item .item-name{
    font-size:14px;font-weight:700;line-height:1.3;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .list-item .item-addr{
    font-size:11.5px;color:#5B6B85;margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .list-item .item-date{font-size:11px;color:var(--red);font-weight:700;margin-top:3px}
  .list-item .item-arrow{color:#C4CDD8;font-size:20px;font-weight:300;flex-shrink:0}
  .list-empty{
    padding:48px 24px;text-align:center;color:#8A97AC;font-size:14px;font-weight:600;
  }

  /* ── トースト ─────────────────────────────── */
  .toast{
    position:fixed;left:50%;bottom:calc(70px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    z-index:2000;background:var(--ink);color:#fff;font-size:13px;font-weight:700;
    border-radius:10px;padding:10px 18px;opacity:0;transition:.25s;pointer-events:none;
    max-width:90vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){
    .bar i,.toast{transition:none}
  }
  @media (max-width:430px){
    .title h1{font-size:15px}
    .tag .num{font-size:16px}
  }
</style>
</head>
<body>
<div id="map" aria-label="ハドフ店舗マップ"></div>

<div class="hud">
  <div class="panel title">
    <h1>ハドフ巡りマップ<small>SAITAMA β &nbsp;/&nbsp; 埼玉県 103店舗</small>
      <div class="bar" aria-hidden="true"><i id="bar"></i></div>
    </h1>
    <div class="tag" id="tag" role="status">
      <span class="lbl">めぐり達成</span>
      <span class="num"><b id="done">0</b>/<span id="total">0</span>店</span>
    </div>
  </div>
</div>

<button class="list-btn" id="list-btn" title="店舗一覧" aria-label="店舗一覧">≡</button>
<button class="locate" id="locate" title="現在地へ移動" aria-label="現在地へ移動">📍</button>

<div class="chips" id="chips" role="group" aria-label="表示フィルタ"></div>
<div class="toast" id="toast" role="status"></div>

<div class="list-sheet" id="list-sheet" role="dialog" aria-modal="true" aria-label="店舗一覧">
  <div class="list-header">
    <div class="list-header-left">
      <h2>店舗一覧</h2>
      <span class="list-header-count" id="list-count"></span>
    </div>
    <button class="list-close" id="list-close" aria-label="閉じる">✕</button>
  </div>
  <div class="list-tabs" id="list-tabs">
    <button class="list-tab on" data-filter="all">すべて</button>
    <button class="list-tab" data-filter="unvisited">未訪問</button>
    <button class="list-tab warn" data-filter="visited">チェック済み</button>
  </div>
  <div class="list-body" id="list-body"></div>
</div>

/* ============ チェックインの永続化 ============ */
const KEY = "hoff-checkins-v1";
let checkins = {};          // {storeId: "2026-07-10"}
let storageOK = false;

async function loadCheckins(){
  try{
    const r = await window.storage.get(KEY);
    if(r && r.value){ checkins = JSON.parse(r.value); }
    storageOK = true;
  }catch(e){
    // キー未作成なら初回セットを試す
    try{
      await window.storage.set(KEY, JSON.stringify({}));
      storageOK = true;
    }catch(e2){
      storageOK = false;
      toast("この環境では保存が使えないため、チェックインはこの画面を開いている間だけ有効です");
    }
  }
}
async function saveCheckins(){
  if(!storageOK) return;
  try{ await window.storage.set(KEY, JSON.stringify(checkins)); }
  catch(e){ toast("保存に失敗しました"); }
}

const map = L.map("map", {zoomControl:false}).setView([35.95, 139.55], 10);
L.control.zoom({position:"topright"}).addTo(map);
L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
}).addTo(map);

/* 複合店（同一座標）のピンが重ならないよう微小オフセット */
const seen = {};
for(const s of STORES){
  const k = s.lat + "," + s.lng;
  const n = seen[k] = (seen[k] ?? -1) + 1;
  if(n > 0){
    const ang = n * 2.1, r = 0.00045 * n;
    s.dlat = s.lat + r * Math.cos(ang);
    s.dlng = s.lng + r * Math.sin(ang) * 1.25;
  }else{
    s.dlat = s.lat; s.dlng = s.lng;
  }
}

function icon(store){
  const done = !!checkins[store.id];
  const mark = (BRANDS[store.brand] || {mark:"?"}).mark;
  return L.divIcon({
    html:`<div class="pin${done?" done":""}"><span>${mark}</span></div>`,
    iconSize:[30,30], iconAnchor:[15,28], popupAnchor:[0,-26],
  });
}

function popupHtml(store){
  const done = !!checkins[store.id];
  const b = BRANDS[store.brand] || {label:store.brand};
  const g = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(store.name + " " + store.address);
  const o = "https://www.hardoff.co.jp/shop/detail/?p=" + store.id;
  const lat = store.lat, lng = store.lng;
  const name = encodeURIComponent(store.name);
  const navGoogle = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  const navApple  = `https://maps.apple.com/?daddr=${lat},${lng}&q=${name}`;
  const navYahoo  = `https://map.yahoo.co.jp/route/car/?to=${lat},${lng}&to_name=${name}`;
  return `<div class="pop${done?" done":""}">
    <span class="brand">${b.label}</span>
    <h2>${store.name}</h2>
    <div class="addr">〒${store.zip}<br>${store.address}</div>
    ${done ? `<div class="date">✔ ${checkins[store.id]} チェックイン</div>` : ""}
    <div class="links">
      <a href="${o}" target="_blank" rel="noopener">公式ページ</a>
      <a href="${g}" target="_blank" rel="noopener">Googleマップ</a>
    </div>
    <button data-id="${store.id}">${done ? "チェックインを取り消す" : "チェックインする"}</button>
    <span class="nav-label">ここへ行く</span>
    <div class="nav-btns">
      <a href="${navGoogle}" target="_blank" rel="noopener" class="nav-btn google">Google<br>マップ</a>
      <a href="${navApple}"  target="_blank" rel="noopener" class="nav-btn apple">Apple<br>マップ</a>
      <a href="${navYahoo}"  target="_blank" rel="noopener" class="nav-btn yahoo">Yahoo!<br>カーナビ</a>
    </div>
    <div class="note">ピン位置は町丁目レベルの近似です。正確な場所はGoogleマップで確認してください。</div>
  </div>`;
}

const markers = {};
function buildMarkers(){
  for(const s of STORES){
    const m = L.marker([s.dlat, s.dlng], {icon:icon(s), title:s.name});
    m.bindPopup(() => popupHtml(s), {autoPan: false});
    markers[s.id] = m;
  }
}

/* ============ フィルタ ============ */
let brandFilter = "all";
let unvisitedOnly = false;

function applyFilter(){
  for(const s of STORES){
    const m = markers[s.id];
    const okBrand = brandFilter === "all" || s.brand === brandFilter;
    const okVisit = !unvisitedOnly || !checkins[s.id];
    const show = okBrand && okVisit;
    if(show && !map.hasLayer(m)) m.addTo(map);
    if(!show && map.hasLayer(m)) map.removeLayer(m);
  }
}

function buildChips(){
  const wrap = document.getElementById("chips");
  const defs = [["all","すべて"], ...Object.entries(BRANDS).map(([k,v])=>[k,v.chip])];
  for(const [key,label] of defs){
    const b = document.createElement("button");
    b.className = "chip" + (key==="all" ? " on" : "");
    b.textContent = label;
    b.dataset.brand = key;
    b.addEventListener("click", () => {
      brandFilter = key;
      wrap.querySelectorAll(".chip[data-brand]").forEach(c => c.classList.toggle("on", c===b));
      applyFilter();
    });
    wrap.appendChild(b);
  }
  const u = document.createElement("button");
  u.className = "chip";
  u.textContent = "未訪問のみ";
  u.addEventListener("click", () => {
    unvisitedOnly = !unvisitedOnly;
    u.classList.toggle("on", unvisitedOnly);
    u.classList.toggle("warn", unvisitedOnly);
    applyFilter();
  });
  wrap.appendChild(u);
}

/* ============ 進捗 ============ */
function refreshProgress(){
  const total = STORES.length;
  const done = STORES.filter(s => checkins[s.id]).length;
  document.getElementById("done").textContent = done;
  document.getElementById("total").textContent = total;
  document.getElementById("bar").style.width = (total ? (100*done/total) : 0) + "%";
}

/* ============ 店舗一覧 ============ */
let listFilter = "all";

function buildList(){
  const body = document.getElementById("list-body");
  body.innerHTML = "";

  let stores = STORES.filter(s => {
    if(listFilter === "unvisited") return !checkins[s.id];
    if(listFilter === "visited")   return !!checkins[s.id];
    return true;
  });

  // 未訪問を先、チェックイン済みを後に
  if(listFilter === "all"){
    stores = [...stores].sort((a,b) => {
      const da = checkins[a.id] ? 1 : 0, db = checkins[b.id] ? 1 : 0;
      return da - db;
    });
  }

  document.getElementById("list-count").textContent = stores.length + "店舗";

  if(stores.length === 0){
    body.innerHTML = '<div class="list-empty">該当する店舗がありません</div>';
    return;
  }

  for(const s of stores){
    const done = !!checkins[s.id];
    const b = BRANDS[s.brand] || {label:s.brand};
    const item = document.createElement("div");
    item.className = "list-item" + (done ? " done" : "");
    item.innerHTML =
      `<div class="item-info">` +
        `<span class="item-brand">${b.label}</span>` +
        `<div class="item-name">${s.name}</div>` +
        `<div class="item-addr">${s.address}</div>` +
        (done ? `<div class="item-date">✔ ${checkins[s.id]} チェックイン済み</div>` : "") +
      `</div>` +
      `<div class="item-arrow">›</div>`;
    item.addEventListener("click", () => {
      closeList();
      setTimeout(() => {
        map.setView([s.dlat, s.dlng], 15);
        setTimeout(() => markers[s.id] && markers[s.id].openPopup(), 400);
      }, 300);
    });
    body.appendChild(item);
  }
}

function openList(){
  buildList();
  document.getElementById("list-sheet").classList.add("open");
}
function closeList(){
  document.getElementById("list-sheet").classList.remove("open");
}

document.getElementById("list-btn").addEventListener("click", openList);
document.getElementById("list-close").addEventListener("click", closeList);

document.getElementById("list-tabs").addEventListener("click", (e) => {
  const tab = e.target.closest("[data-filter]");
  if(!tab) return;
  listFilter = tab.dataset.filter;
  document.querySelectorAll(".list-tab").forEach(t => t.classList.toggle("on", t === tab));
  buildList();
});

/* ============ チェックイン操作（ポップアップ内ボタン） ============ */
map.on("popupopen", (e) => {
  const btn = e.popup.getElement().querySelector("button[data-id]");
  if(!btn) return;
  btn.addEventListener("click", async () => {
    const id = btn.dataset.id;
    const store = STORES.find(s => s.id === id);
    const savedCenter = map.getCenter();
    const savedZoom   = map.getZoom();
    if(checkins[id]){
      delete checkins[id];
      toast(store.name + " のチェックインを取り消しました");
    }else{
      const d = new Date();
      checkins[id] = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      toast("🔴 " + store.name + " にチェックイン！");
    }
    await saveCheckins();
    markers[id].setIcon(icon(store));
    markers[id].setPopupContent(popupHtml(store));
    refreshProgress();
    applyFilter();
    map.setView(savedCenter, savedZoom, {animate: false});
  });
});

/* ============ 現在地・追従モード ============ */
let meMarker = null;
let followMode = false;
let watchId = null;

function updateMeMarker(lat, lng){
  if(meMarker) map.removeLayer(meMarker);
  meMarker = L.circleMarker([lat,lng], {radius:8, color:"#fff", weight:3, fillColor:"#1355A4", fillOpacity:1}).addTo(map);
}

function setFollowMode(on){
  followMode = on;
  const btn = document.getElementById("locate");
  btn.classList.toggle("on", on);
  btn.title = on ? "追従モードをオフ" : "現在地へ移動";
  btn.setAttribute("aria-label", on ? "追従モードをオフ" : "現在地へ移動");
  if(!on && watchId !== null){
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
}

document.getElementById("locate").addEventListener("click", () => {
  if(!navigator.geolocation){ toast("この環境では位置情報が使えません"); return; }
  if(followMode){ setFollowMode(false); toast("追従モードをオフにしました"); return; }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const {latitude:lat, longitude:lng} = pos.coords;
      updateMeMarker(lat, lng);
      map.setView([lat, lng], 13);
      setFollowMode(true);
      toast("現在地に追従中 — 地図を動かすと停止します");
      watchId = navigator.geolocation.watchPosition(
        (p) => {
          updateMeMarker(p.coords.latitude, p.coords.longitude);
          if(followMode) map.panTo([p.coords.latitude, p.coords.longitude]);
        },
        () => {},
        {enableHighAccuracy:true}
      );
    },
    () => toast("現在地を取得できませんでした"),
    {enableHighAccuracy:true, timeout:8000}
  );
});

map.on("dragstart", () => {
  if(followMode){ setFollowMode(false); }
});

/* ============ トースト ============ */
let toastTimer = null;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

/* ============ 初期化 ============ */
(async function init(){
  await loadCheckins();
  buildMarkers();
  buildChips();
  applyFilter();
  refreshProgress();
})();
</script>
</body>
</html>
